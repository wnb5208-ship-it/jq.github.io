<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple Style</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

nav{
position:fixed;
top:0;
width:100%;
height:60px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
display:flex;
justify-content:center;
align-items:center;
}

nav h1{
font-size:20px;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h2{
font-size:72px;
margin-bottom:20px;
}

.hero p{
font-size:24px;
color:#aaa;
max-width:700px;
line-height:1.6;
}

.hero button{
margin-top:40px;
padding:15px 35px;
border:none;
border-radius:999px;
background:white;
font-size:18px;
cursor:pointer;
}

.section{
padding:100px 20px;
text-align:center;
}

.cards{
margin-top:60px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#111;
padding:40px;
border-radius:30px;
}

footer{
padding:40px;
text-align:center;
color:#666;
}

</style>
</head>

<body>

<nav>
<h1>Shanshan Studio</h1>
</nav>

<section class="hero">

<h2>Think Different.</h2>

<p>
一个 Apple 风格的现代网站
</p>

<button>Explore</button>

</section>

<section class="section">

<h2>Beautiful Design</h2>

<div class="cards">

<div class="card">
<h3>Fast</h3>
<p>超快速网站体验</p>
</div>

<div class="card">
<h3>Modern</h3>
<p>现代化 Apple 风格</p>
</div>

<div class="card">
<h3>Responsive</h3>
<p>自动适配手机电脑</p>
</div>

</div>

</section>

<footer>
© 2026 Shanshan Studio
</footer>

</body>
</html>
